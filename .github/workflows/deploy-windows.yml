name: Deploy to Stable Server (Windows)

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-windows
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync Windows Server
    runs-on: [self-hosted, Windows]
    timeout-minutes: 20
    env:
      PM2_HOME: 'C:\Users\ANTRIAN 1\.pm2'
      HOMEPATH: 'C:\Users\ANTRIAN 1'

    steps:
      # (PM2 commands removed to prevent daemon conflicts)

      # ── Step 1: Checkout ──────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # Fix: GitHub Actions runner runs as NETWORK SERVICE, but user is ANTRIAN 1
      - name: Fix Git Safe Directory
        shell: powershell
        run: |
          git config --global --add safe.directory $env:GITHUB_WORKSPACE
          Write-Host "Safe directory added."

      # ── Step 2: Create .env ───────────────────────────────────────────────────
      - name: Create Server Environment (.env)
        shell: powershell
        run: |
          $content = @(
            'DATABASE_URL="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'DATABASE_URL_UNPOOLED="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'PGHOST="localhost"',
            'PGUSER="medcore"',
            'PGDATABASE="medcoredb"',
            'PGPASSWORD="medcore_local_password"',
            'POSTGRES_PRISMA_URL="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'ADMIN_KEY="dev_key_123"',
            'NEXT_PUBLIC_ADMIN_KEY="dev_key_123"',
            'CRON_SECRET="siaga_medika_secret_2024"',
            'JWT_SECRET="mc_jwt_k3y!S1ag4M3d1k4_2024_secure_t0ken_s3cr3t"',
            'NEXT_PUBLIC_APP_URL="https://simed.fallonava.my.id"',
            'HOSTNAME="0.0.0.0"',
            'NODE_ENV="production"',
            'PORT="3000"'
          )
          $content | Set-Content -Path ".env" -Encoding UTF8
          Write-Host ".env created."

      # ── Step 3: Install Dependencies ─────────────────────────────────────────
      - name: Install Dependencies
        run: npm ci

      # ── Step 4: Database - Schema Push + Migrate ──────────────────────────────
      # db push handles new models not yet in migration files (safe for additive changes)
      - name: Sync Database Schema
        shell: powershell
        run: |
          npx prisma migrate deploy
          npx prisma db push --accept-data-loss
          Write-Host "Database schema synced."

      # ── Step 5: Generate Prisma Client ───────────────────────────────────────
      - name: Generate Prisma Client
        run: npx prisma generate

      # ── Step 6: Build Next.js + Compile custom server ────────────────────────
      - name: Build Application
        run: npm run build

      # ── Step 7: Copy static assets to standalone (REQUIRED for Next.js standalone) ──
      - name: Copy Static Assets to Standalone
        shell: powershell
        run: |
          Copy-Item -Recurse -Force ".next\static" ".next\standalone\.next\static"
          Copy-Item -Recurse -Force "public" ".next\standalone\public"
          Write-Host "Static assets copied to standalone."

      # ── Step 8: Trigger Scheduled Task for Restart ───────────────────────────
      - name: Restart Application
        shell: powershell
        run: |
          Write-Host "Memicu restart via Scheduled Task (menghindari konflik PM2 daemon)..."
          schtasks /run /tn "RestartAdminDashboard"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Restart berhasil dipicu!"
          } else {
            Write-Host "Peringatan: Scheduled Task 'RestartAdminDashboard' gagal dipicu."
          }
