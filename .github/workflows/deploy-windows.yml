name: Deploy to Stable Server (Windows)

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-windows
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync Windows Server
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15
    env:
      PM2_HOME: 'C:\Users\ANTRIAN 1\.pm2'
      HOMEPATH: 'C:\Users\ANTRIAN 1'

    steps:
      # Step 0: Stop PM2 to release file locks before cleaning workspace
      - name: Stop PM2 to Release File Locks
        shell: powershell
        run: |
          $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"
          try {
            pm2 stop admin-dashboard 2>$null
            Write-Host "PM2 stopped."
          } catch {
            Write-Host "PM2 not running or already stopped."
          }

      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Server Environment (.env)
        shell: powershell
        run: |
          $content = @(
            'DATABASE_URL="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'DATABASE_URL_UNPOOLED="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'PGHOST="localhost"',
            'PGUSER="medcore"',
            'PGDATABASE="medcoredb"',
            'PGPASSWORD="medcore_local_password"',
            'POSTGRES_PRISMA_URL="postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable"',
            'ADMIN_KEY="dev_key_123"',
            'NEXT_PUBLIC_ADMIN_KEY="dev_key_123"',
            'CRON_SECRET="siaga_medika_secret_2024"',
            'JWT_SECRET="mc_jwt_k3y!S1ag4M3d1k4_2024_secure_t0ken_s3cr3t"',
            'NEXT_PUBLIC_APP_URL="https://simed.fallonava.my.id"',
            'HOSTNAME="0.0.0.0"',
            'NODE_ENV="production"',
            'PORT="3000"'
          )
          $content | Set-Content -Path ".env" -Encoding UTF8
          Write-Host ".env berhasil dibuat"

      - name: Install Dependencies
        run: npm ci

      # Step 3: Database Migration
      - name: Run Database Migrations
        run: npx prisma migrate deploy

      # Step 3.5: Generate Prisma Client
      - name: Generate Prisma Client
        run: npx prisma generate

      # Step 4: Build the application
      - name: Run Build
        run: npm run build

      # Step 5: Restart Application via Scheduled Task
      # (Scheduled Task "RestartAdminDashboard" harus sudah didaftarkan di server)
      - name: Restart Application
        shell: powershell
        run: |
          Write-Host "Memicu restart via Scheduled Task..."
          schtasks /run /tn "RestartAdminDashboard"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Restart berhasil dipicu!"
          } else {
            Write-Host "Scheduled Task tidak ditemukan. Coba langsung via PM2..."
            $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"
            Start-Process -FilePath "pm2" -ArgumentList "restart admin-dashboard" -Verb RunAs -Wait
          }
