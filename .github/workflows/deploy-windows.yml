name: Deploy to Stable Server (Windows)

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-windows
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to C:\simed-production
    runs-on: [self-hosted, Windows]
    timeout-minutes: 30
    env:
      PM2_HOME: 'C:\Users\ANTRIAN 1\.pm2'
      PROD_DIR: 'C:\simed-production'
      NODE_NO_WARNINGS: 1

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Fix Git Safe Directory
        shell: powershell
        run: |
          git config --global --add safe.directory $env:GITHUB_WORKSPACE
          Write-Host "Safe directory added: $env:GITHUB_WORKSPACE"

      # ── Step 2: Create .env ──────────────────────────────────────────────────
      - name: Create Server Environment (.env)
        shell: powershell
        run: |
          $lines = @(
            'DATABASE_URL=postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable',
            'DIRECT_URL=postgresql://medcore:medcore_local_password@localhost:5432/medcoredb?sslmode=disable',
            'PGHOST=localhost',
            'PGUSER=medcore',
            'PGDATABASE=medcoredb',
            'PGPASSWORD=medcore_local_password',
            'ADMIN_KEY=dev_key_123',
            'NEXT_PUBLIC_ADMIN_KEY=dev_key_123',
            'CRON_SECRET=siaga_medika_secret_2024',
            'JWT_SECRET=mc_jwt_k3y!S1ag4M3d1k4_2024_secure_t0ken_s3cr3t',
            'NEXT_PUBLIC_APP_URL=https://simed.fallonava.my.id',
            'HOSTNAME=0.0.0.0',
            'NODE_ENV=production',
            'PORT=3000',
            'AGENT_EXEC_TOKEN=ac-7928-df91-4e8a-8db4-314a4d467736-mc-secure-gate-2026-gravity',
            '# Redis & MongoDB (LEGACY) - Removed to prevent crashes'
          )
          $lines | Set-Content -Path ".env" -Encoding UTF8
          Write-Host ".env created."

      # ── Step 3: Install Dependencies ────────────────────────────────────────
      - name: Install Dependencies
        shell: powershell
        run: |
          npm ci
          Write-Host "npm ci selesai."

      # ── Step 4: Database Migration ──────────────────────────────────────────
      - name: Sync Database Schema
        shell: powershell
        run: |
          npx prisma migrate deploy
          Write-Host "Database schema synced."

      # ── Step 5: Generate Prisma Client ──────────────────────────────────────
      - name: Generate Prisma Client
        shell: powershell
        run: |
          npx prisma generate
          Write-Host "Prisma client generated."

      # ── Step 6: Build Application ────────────────────────────────────────────
      - name: Build Application
        shell: powershell
        env:
          NODE_OPTIONS: "--max-old-space-size=2048" # Cegah build memakan seluruh RAM server
        run: |
          npm run build
          Write-Host "Build selesai."

      # ── Step 8: Prepare Production Directory ─────────────────────────────────
      - name: Prepare Production Directory
        shell: powershell
        run: |
          $ProdDir = $env:PROD_DIR
          if (-not (Test-Path $ProdDir)) {
            New-Item -ItemType Directory -Path $ProdDir -Force | Out-Null
            Write-Host "Direktori $ProdDir dibuat."
          } else {
            Write-Host "Direktori $ProdDir sudah ada."
          }

      # ── Step 9: Stop PM2 Safely (BEFORE touching files) ──────────────────────
      - name: Stop PM2 Safely
        shell: powershell
        run: |
          $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"

          # Gunakan try/catch agar NativeCommandError dari PowerShell tidak menggagalkan workflow
          try {
            cmd.exe /c "pm2 stop all" 2>$null
            cmd.exe /c "pm2 delete all" 2>$null
            
            # Paksa matikan sisa chrome dan node agar RAM bersih (Zombie killer)
            taskkill /F /IM chrome.exe /T 2>$null
            taskkill /F /IM node.exe /T 2>$null
          } catch {
            # Abaikan error jika PM2 belum ada proses yang berjalan
          }

          # Beri waktu file locks dilepas sebelum Robocopy
          Start-Sleep -Seconds 5
          Write-Host "PM2 dihentikan (atau sudah dalam keadaan berhenti)."

          # Wajib ada agar GitHub Actions menganggap step ini sukses meskipun kosong
          exit 0

      # ── Step 10: Robocopy Build → Production ─────────────────────────────────
      - name: Sync Files to Production Directory
        shell: powershell
        run: |
          $Src     = $env:GITHUB_WORKSPACE
          $Dst     = $env:PROD_DIR
          # Mirror semua file, kecuali git artifacts dan source node_modules dev
          robocopy $Src $Dst /MIR /XD .git .github /R:2 /W:2 /NP /NFL /NJH /NDL
          # Robocopy exit code <= 7 = sukses (0=no change, 1=copied, 2=extra, 4=mismatch, etc.)
          if ($LASTEXITCODE -le 7) {
            Write-Host "Robocopy selesai sukses (exit code: $LASTEXITCODE)"
            exit 0
          } else {
            Write-Error "Robocopy GAGAL dengan exit code: $LASTEXITCODE"
            exit 1
          }

      # ── Step 10.5: Global PM2 Optimization ──────────────────────────────────
      - name: Optimize Global PM2 (Logrotate)
        shell: cmd
        run: |
          set PM2_HOME=C:\Users\ANTRIAN 1\.pm2
          echo Mengonfigurasi pm2-logrotate...

          :: Install bila belum ada
          call pm2.cmd install pm2-logrotate

          :: Set standar industri untuk Windows Stability
          call pm2.cmd set pm2-logrotate:max_size 10M
          call pm2.cmd set pm2-logrotate:retain 7
          call pm2.cmd set pm2-logrotate:compress true
          call pm2.cmd set pm2-logrotate:workerInterval 60

          echo Logrotate dikonfigurasi.

      # ── Step 11: Start PM2 from Production Directory ──────────────────────────
      - name: Start PM2 from Production
        shell: powershell
        run: |
          $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"
          $ProdDir = $env:PROD_DIR
          Set-Location $ProdDir

          # Pastikan folder log ada agar PM2 tidak error saat menulis log
          if (-not (Test-Path "$ProdDir\logs")) {
            New-Item -ItemType Directory -Path "$ProdDir\logs" -Force | Out-Null
          }

          if (-not (Test-Path "ecosystem.config.js")) {
            Write-Error "ecosystem.config.js tidak ditemukan di $ProdDir!"
            exit 1
          }

          Write-Host "Menjalankan aplikasi menggunakan ecosystem.config.js..."
          # Pastikan ErrorActionPreference tidak memutus alur untuk peringatan non-kritikal
          $ErrorActionPreference = "Continue"

          # Jalankan via pm2.cmd eksplisit untuk melihat pesan eror aslinya
          & pm2.cmd flush
          & pm2.cmd start ecosystem.config.js --update-env
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "PM2 (pm2.cmd) start GAGAL dengan exit code $LASTEXITCODE. Menghentikan workflow."
            exit 1
          }
          
          & pm2.cmd save --force
          Write-Host "State PM2 disimpan."

      # ── Step 12: Verify ───────────────────────────────────────────────────────
      - name: Verify Deployment
        shell: powershell
        run: |
          $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"
          Start-Sleep -Seconds 5
          
          $pm2Status = cmd.exe /c "pm2 list"
          Write-Host $pm2Status
          
          $errored = $pm2Status | Select-String "errored"
          if ($errored) {
            Write-Error "ADA PROSES YANG ERROR! Cek pm2 logs."
            exit 1
          }
          
          # HARSH CHECK: Pastikan admin-dashboard benar-benar masuk daftar
          $adminExists = $pm2Status | Select-String "admin-dashboard"
          if (-not $adminExists) {
            Write-Error "SILENT FAILURE DETECTED: admin-dashboard tidak ditemukan di PM2!"
            exit 1
          }
          
          Write-Host "✅ Semua proses berjalan normal dan terdaftar di PM2!"
          exit 0

      # ── Step 13: Diagnostic on Failure ────────────────────────────────────────
      - name: Diagnostic on Failure
        if: failure()
        shell: powershell
        run: |
          $env:PM2_HOME = "C:\Users\ANTRIAN 1\.pm2"
          $ProdDir = $env:PROD_DIR
          Write-Host "❌ Deployment GAGAL! Mengambil log eror..."

          Write-Host "--- [PM2 STATUS] ---"
          cmd.exe /c "pm2 list"

          Write-Host "--- [ADMIN ERROR LOG] ---"
          if (Test-Path "$ProdDir\logs\admin-error.log") {
            Get-Content "$ProdDir\logs\admin-error.log" -Tail 50
          } else {
             Write-Host "Log admin-error.log tidak ditemukan."
          }

          Write-Host "--- [WA-WORKER ERROR LOG] ---"
          if (Test-Path "$ProdDir\logs\wa-worker-error.log") {
            Get-Content "$ProdDir\logs\wa-worker-error.log" -Tail 50
          }
