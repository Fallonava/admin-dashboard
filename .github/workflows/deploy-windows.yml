name: Deploy to Stable Server (Windows)

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-windows
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync Windows Server
    runs-on: [self-hosted, Windows]
    timeout-minutes: 15

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Server Environment (.env)
        shell: bash
        run: |
          echo "DATABASE_URL=\"postgresql://postgres:postgres@localhost:5432/hospital_db?schema=public\"" > .env
          echo "NEXT_PUBLIC_APP_URL=\"http://localhost:3000\"" >> .env
          echo "NODE_ENV=\"production\"" >> .env
          echo "PORT=\"3000\"" >> .env
          echo "JWT_SECRET=\"rahasia_admin_srimed_2026\"" >> .env

      - name: Install Dependencies
        run: npm ci

      # Step 3: Database Migration
      - name: Run Database Migrations
        run: npx prisma migrate deploy

      # Step 4: Build the application
      - name: Run Build
        run: npm run build

      # Step 4: Restart PM2 Service or any equivalent Windows task
      - name: Restart Application
        run: |
          pm2 restart admin-dashboard || pm2 start server.js --name "admin-dashboard"
          pm2 save
