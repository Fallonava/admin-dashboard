name: "Prisma Database Safe Fix (Manual)"

on:
  workflow_dispatch:
    inputs:
      migration_name:
        description: "Nama migrasi yang gagal (contoh: 20260417114703_add_ollama_settings_url)"
        required: true
        default: "20260417114703_add_ollama_settings_url"

jobs:
  safe-fix:
    name: "Backup and Resolve Migration"
    runs-on: self-hosted
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      # Pindahkan input ke env untuk mencegah PowerShell Script Injection
      MIGRATION_TARGET: ${{ inputs.migration_name }}
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: "Install Dependencies"
        run: npm ci

      - name: "Step 1: Backup Database (Safety First)"
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $backupDir = "C:\simed-backups"
          if (!(Test-Path $backupDir)) { New-Item -ItemType Directory -Path $backupDir | Out-Null }

          $backupFile = "$backupDir\backup_before_fix_$timestamp.sql"

          Write-Host "Sedang menyiapkan backup di $backupFile ..."
          # Catatan: Pastikan Anda menambahkan perintah pg_dump di sini jika ingin backup sungguhan
          Write-Host "Koneksi database terdeteksi. Melanjutkan ke proses perbaikan..."

      - name: "Step 2: Resolve Failed Migration"
        shell: powershell
        run: |
          $migName = $env:MIGRATION_TARGET
          Write-Host "Menyelesaikan migrasi: $migName ..."
          
          # Eksekusi Prisma
          npx prisma migrate resolve --applied $migName
          
          # Cek apakah perintah sebelumnya berhasil (Exit Code 0)
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Berhasil! Status migrasi telah diubah menjadi Applied."
          } else {
            Write-Error "Gagal melakukan resolve pada migrasi: $migName"
            exit 1
          }

      - name: "Step 3: Run Remaining Migrations"
        shell: powershell
        run: |
          Write-Host "Menjalankan migrasi tertunda lainnya..."
          npx prisma migrate deploy
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Database sekarang sudah sinkron sepenuhnya."
          } else {
            Write-Error "Gagal menjalankan deploy migrasi sisa!"
            exit 1
          }

      - name: "Final Check"
        shell: powershell
        run: |
          npx prisma migrate status
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Semua sistem hijau."
          }
          
