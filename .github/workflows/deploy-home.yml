name: Deploy to Home Server

on:
  push:
    branches:
      - master

# Batalkan run lama jika ada push baru masuk — cegah race condition
concurrency:
  group: deploy-home
  cancel-in-progress: true

env:
  DEPLOY_DIR: /home/fallonava/admin-dashboard
  LOG_FILE: /home/fallonava/logs/fresh-deploy.log

jobs:
  deploy:
    name: Sync Home Server
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Run Fresh Deploy Script
        run: |
          cd ${{ env.DEPLOY_DIR }}
          bash scripts/fresh-deploy.sh

      - name: Verify PM2 is running
        if: success()
        run: pm2 show medcore-admin

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy GAGAL pada $(date '+%Y-%m-%d %H:%M:%S')"
          echo "📋 Log terakhir:"
          tail -30 ${{ env.LOG_FILE }} 2>/dev/null || echo "(log tidak ditemukan)"
