version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: medcore-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: medcore
      POSTGRES_PASSWORD: medcore_local_password
      POSTGRES_DB: medcoredb
    volumes:
      - /mnt/AppData/medcore-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medcore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: medcore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "medcore_redis_password", "--appendonly", "yes"]
    volumes:
      - /mnt/AppData/medcore-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "medcore_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: medcore-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: medcore_mongo_password
      MONGO_INITDB_DATABASE: rekap-harian
    volumes:
      - /mnt/AppData/medcore-mongo-data:/data/db
