<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Jadwal Dokter - RSU Siaga Medika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
      rel="stylesheet"
    />
    <style>
      /* Google Fonts Material Icons Round */
      /* Google Fonts Material Icons Round loaded via <link> */

      .material-icons-round {
        font-family: "Material Icons Round";
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;

        /* Support for all WebKit browsers. */
        -webkit-font-smoothing: antialiased;
        /* Support for Safari and Chrome. */
        text-rendering: optimizeLegibility;

        /* Support for Firefox. */
        -moz-osx-font-smoothing: grayscale;

        /* Support for IE. */
        font-feature-settings: "liga";
      }

      :root {
        /* Semantic Base Colors (Clinical Dark) */
        --bg-body: #0B1120;
        --bg-ambient: radial-gradient(at 10% 0%, rgba(2, 132, 199, 0.15) 0px, transparent 50%),
                      radial-gradient(at 90% 10%, rgba(124, 58, 237, 0.12) 0px, transparent 50%),
                      radial-gradient(at 50% 100%, rgba(225, 29, 72, 0.1) 0px, transparent 50%),
                      linear-gradient(145deg, #0F172A 0%, #060B14 100%);
        --text-primary: #F8FAFC;
        --text-secondary: #94A3B8;
        --glass-panel: rgba(15, 23, 42, 0.85); /* Slate 900 translucent */
        --card-bg: rgba(30, 41, 59, 1); /* Slate 800 Solid */
        --header-bg: rgba(255, 255, 255, 0.02);
        --border-light: rgba(255, 255, 255, 0.08); /* Tipis membatasi ruang */
        --platter-border: rgba(255, 255, 255, 0.06); 
        --footer-bg: rgba(15, 23, 42, 0.95);
        --app-bg-overlay: transparent;
        --shadow: inset 0 1px 1px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.25);
        --accent-blue: #3B82F6;   /* 2026 Vivid Blue */
        --accent-purple: #A855F7;  /* Electric Violet */
        --accent-green: #00C96B;   /* Vivid Emerald */
        --accent-orange: #FF6B35;  /* Deep Orange */
        --accent-red: #E11D48;     /* Clinical Red (emergency only) */
        --logo-text: #ffffff;
      }

      /* Light Mode Theme (Clinical Light) */
      [data-theme="light"] {
        --bg-body: #F8FAFC; /* Slate 50 */
        --bg-ambient: radial-gradient(at 10% 0%, rgba(3, 105, 161, 0.08) 0px, transparent 50%),
                      radial-gradient(at 90% 10%, rgba(109, 40, 217, 0.05) 0px, transparent 50%),
                      radial-gradient(at 50% 100%, rgba(190, 18, 60, 0.04) 0px, transparent 50%),
                      linear-gradient(145deg, #F8FAFC 0%, #F1F5F9 100%);
        --text-primary: #0F172A;
        --text-secondary: #64748B;
        --glass-panel: rgba(255, 255, 255, 1); /* Pure Solid White */
        --card-bg: rgba(255, 255, 255, 1);
        --header-bg: rgba(0, 0, 0, 0.02);
        --border-light: rgba(0, 0, 0, 0.08);
        --platter-border: rgba(0, 0, 0, 0.04);
        --footer-bg: rgba(255, 255, 255, 1);
        --app-bg-overlay: transparent;
        --shadow: inset 0 1px 1px rgba(255, 255, 255, 1), 0 8px 32px -4px rgba(0, 0, 0, 0.06);
        --logo-text: #0F172A;
        
        --accent-blue: #3B82F6;
        --accent-purple: #A855F7;
        --accent-green: #00C96B;
        --accent-orange: #FF6B35;
        --accent-red: #BE123C;
      }

      /* ===== RESET & BASE ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background: var(--bg-body);
        color: var(--text-primary);
        user-select: none;
        cursor: none;
        transition:
          background 0.5s ease,
          color 0.5s ease;
      }

      .ambient-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: var(--bg-ambient);
      }

      /* ===== HARDWARE SAFE MODE (TCL/Android TV Optimization) ===== */
      @media (prefers-reduced-motion: reduce) {
        .ambient-bg {
          background: var(--bg-body) !important;
        }

        .app-container,
        .footer {
          backdrop-filter: none !important;
          background: rgba(20, 20, 22, 0.95) !important;
        }

        .platter {
          box-shadow: none !important;
          border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        * {
          animation-duration: 0.001s !important;
          transition-duration: 0.001s !important;
        }
      }

      body.tv-optimized .ambient-bg {
        background: var(--bg-body) !important;
      }

      body.tv-optimized .bg-orb,
      body.tv-optimized .bg-grid {
        animation: none !important;
        display: none !important;
        /* Hilangkan sepenuhnya pembakar GPU ini */
      }

      body.tv-optimized .ticker-inner {
        animation: none !important;
        /* Hentikan marquee */
        transform: translateX(0) !important;
      }

      body.tv-optimized .app-container,
      body.tv-optimized .island,
      body.tv-optimized .sidebar-panel,
      body.tv-optimized .footer {
        backdrop-filter: none !important;
        background: rgba(20, 20, 22, 1) !important;
      }

      body.tv-optimized .logo-box {
        /* box-shadow left alone to allow glow */
      }

      body.tv-optimized .platter {
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
      }

      body.tv-optimized .platter.active {
        box-shadow: none !important;
        transform: translateZ(0) scale(1) !important;
      }

      body.tv-optimized .dynamic-island {
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5) !important;
      }

      /* ===== LAYOUT CONTAINER ===== */
      .app-container {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 16px 20px; /* Relieved breathing room */
        gap: 24px; /* Broader spatial gap */
        background: var(--app-bg-overlay);
      }

      /* ===== HEADER ===== */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: auto;
        flex-shrink: 0;
        padding: 24px 20px 0 20px;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .header .brand {
        width: 100%;
      }

      .header .time-group {
        width: 100%;
        text-align: left;
        padding-top: 16px;
        border-top: 1px solid var(--border-light);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo-box {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          var(--accent-blue),
          var(--accent-purple)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        /* box-shadow: 0 4px 16px rgba(10, 132, 255, 0.3); */
      }

      .logo-icon {
        font-size: 26px;
        color: white;
      }

      .title-group h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: var(--text-primary);
      }

      .title-group span {
        font-size: 11px;
        font-weight: 500;
        opacity: 0.7;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--text-secondary);
      }

      .time-group {
        text-align: right;
      }

      .clock {
        font-size: 32px;
        font-weight: 400;
        letter-spacing: -0.03em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .date {
        font-size: 12px;
        font-weight: 600;
        opacity: 0.6;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        margin-top: 2px;
      }

      /* ===== CONTENT GRID ===== */
      .content {
        flex: 1;
        display: flex;
        gap: 24px;
        min-height: 0;
      }

      .island {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--glass-panel);
        border-radius: 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-light);
        overflow: visible; /* Allow active cards to float above */
        transition: background 0.5s ease;
        position: relative;
      }

      /* Island identity: colored top-border accent per kategori */
      .island-bedah {
        border-top: 2px solid rgba(59, 130, 246, 0.5);
      }
      .island-nonbedah {
        border-top: 2px solid rgba(168, 85, 247, 0.5);
      }

      .sidebar-panel {
        flex: 0 0 320px;
        max-width: 340px;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        background: var(--glass-panel);
        border-right: none;
        border-radius: 24px;
        margin-right: 0;
        overflow: hidden;
        z-index: 10;
        /* box-shadow: 4px 0 16px rgba(0, 0, 0, 0.08); */
      }

      .sidebar-panel .island-header {
        background: transparent;
        border-bottom: 1px solid rgba(125, 125, 125, 0.06);
      }

      /* Sidebar Item Tweaks */
      .sidebar-panel .platter {
        background: transparent;
        border: 1px solid transparent;
        box-shadow: none;
        padding: 10px 12px;
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        color: var(--text-primary);
        gap: 12px;
      }

      /* Stat Panel */
      .stat-panel {
        display: flex;
        justify-content: space-around;
        padding: 10px 16px;
        background: rgba(0, 0, 0, 0.03);
        border-bottom: 1px solid var(--border-light);
        gap: 8px;
      }

      /* ===== SIDEBAR STAT ITEMS — Neumorphic Mini Badges ===== */
      .stat-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        padding: 8px;
        border-radius: 12px;
        background: rgba(10, 16, 30, 0.5); /* near-dark for neo */
        /* Raised neumorphic mini tile */
        box-shadow:
          -3px -3px 7px rgba(255, 255, 255, 0.04),
           3px  3px 7px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      [data-theme="light"] .stat-item {
        background: #eef2f7;
        box-shadow:
          -3px -3px 7px rgba(255, 255, 255, 0.9),
           3px  3px 7px rgba(163, 177, 198, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 1);
      }

      .stat-count {
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
      }

      .stat-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        opacity: 0.65;
        margin-top: 4px;
      }

      /* Force dark text in sidebar when in light mode, but adapt in dark mode */
      [data-theme="light"] .sidebar-panel {
        color: #1d1d1f;
      }

      [data-theme="dark"] .sidebar-panel {
        color: #f5f5f7;
      }

      [data-theme="dark"] .sidebar-panel .doc-name,
      [data-theme="dark"] .sidebar-panel .header h1,
      [data-theme="dark"] .sidebar-panel .clock {
        color: #fff !important;
      }

      [data-theme="dark"] .sidebar-panel .doc-spec {
        color: rgba(255, 255, 255, 0.85) !important;
      }

      [data-theme="dark"] .sidebar-panel .header span,
      [data-theme="dark"] .sidebar-panel .date,
      [data-theme="dark"] .sidebar-panel .island-title {
        color: rgba(255, 255, 255, 0.6) !important;
      }

      .sidebar-panel .doc-name {
        color: var(--text-primary) !important;
      }

      .sidebar-panel .doc-spec {
        color: var(--text-primary) !important;
        opacity: 0.85;
        margin-top: 1px;
      }

      /* Override sidebar initials now handled in .initials block above */

      /* Header Dark Mode Override */
      .sidebar-panel .header h1 {
        color: #1d1d1f !important;
      }

      .sidebar-panel .header span {
        color: rgba(0, 0, 0, 0.6) !important;
      }

      .sidebar-panel .clock {
        color: #1d1d1f !important;
      }

      .sidebar-panel .date {
        color: rgba(0, 0, 0, 0.6) !important;
      }

      .sidebar-panel .island-title {
        color: rgba(0, 0, 0, 0.5) !important;
      }

      .sidebar-panel .island-badge {
        background: rgba(125, 125, 125, 0.15);
        color: var(--text-primary);
      }

      .sidebar-panel .platter:hover {
        background: rgba(125, 125, 125, 0.05);
      }

      .sidebar-panel .platter.active {
        background: var(--status-bg) !important;
        color: #fff !important;
        /* Force readable contrast for active items */
      }

      /* Active Accent Indicator for Sidebar */
      .sidebar-panel .platter.active::before {
        background: var(--status-color);
        width: 3px;
        border-radius: 3px;
        left: 4px;
        top: 4px;
        bottom: 4px;
      }

      /* Remove Active Animations in Sidebar for Performance */
      .sidebar-panel .platter.active .live-status {
        animation: none !important;
      }

      .sidebar-panel .platter.active .pulse-dot {
        animation: none !important;
        opacity: 1 !important;
        transform: scale(1) !important;
      }

      .sidebar-panel .doc-name {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1.3;
        transition: color 0.3s ease;
        white-space: normal;
        overflow: visible;
        word-break: break-word;
      }

      .sidebar-panel .doc-spec {
        font-size: 14px;
        font-weight: 800;
        color: var(--text-primary) !important;
        opacity: 1;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        line-height: 1.1;
        margin-bottom: 1px;
      }

      /* ===== ISLAND HEADER IDENTITY GRADIENT ===== */
      .island-header {
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
        background: var(--header-bg);
        border-bottom: 1px solid rgba(125, 125, 125, 0.08);
        transition: background 0.5s ease;
        border-radius: 20px 20px 0 0; /* Ikut border-radius island */
      }

      /* Bedah island header: subtle blue gradient tint */
      .island-bedah .island-header {
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.1) 0%,
          transparent 60%
        );
      }
      /* Non Bedah island header: subtle purple gradient tint */
      .island-nonbedah .island-header {
        background: linear-gradient(
          135deg,
          rgba(168, 85, 247, 0.1) 0%,
          transparent 60%
        );
      }

      .island-title {
        font-size: 13px;
        font-weight: 800;
        opacity: 0.65;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .island-badge {
        font-size: 12px;
        font-weight: 700;
        background: rgba(125, 125, 125, 0.15);
        color: var(--text-primary);
        padding: 2px 8px;
        border-radius: 6px;
      }

      .scroll-mask {
        flex: 1;
        overflow: hidden;
        position: relative;
        /* Padding atas extra agar kartu floating tidak terpotong */
        padding-top: 6px;
        margin-top: -6px;
        /* Fade masks untuk scroll feel */
        mask-image: linear-gradient(
          to bottom,
          transparent,
          black 22px,
          black calc(100% - 6px),
          transparent
        );
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 22px,
          black calc(100% - 6px),
          transparent
        );
      }

      .scroller {
        padding: 16px 16px 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px; /* Lebih breathable antar kartu */
        will-change: transform;
      }

      /* ===== PLATTER CARD (Pseudo-3D Physical Emboss) ===== */
      .platter {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        padding: 14px 16px;
        background: var(--card-bg);
        border-radius: 18px; /* Squircle 2026 */
        border: 1px solid var(--platter-border);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 2px 8px rgba(0, 0, 0, 0.12);
        position: relative;
        overflow: hidden;
        transform: translateZ(0) translateY(0);
        opacity: 1;
        transition:
          opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1),
          border-color 0.35s ease,
          transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1),
          box-shadow 0.35s ease,
          background-color 0.35s ease;
      }

      [data-theme="light"] .platter {
        opacity: 1;
        background: #ffffff;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 1),
          0 1px 4px rgba(0, 0, 0, 0.04),
          0 4px 16px -4px rgba(0, 0, 0, 0.06);
      }

      /* Top Gradient Shimmer — mengganti left bar kasar era 2020 */
      /* Garis tipis 1px di atas card, prismatic/gradient sesuai warna status */
      .platter::before {
        content: "";
        position: absolute;
        top: 0;
        left: 16px;
        right: 16px;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--status-color) 30%,
          var(--status-color) 70%,
          transparent
        );
        opacity: 0.6;
        border-radius: 1px;
      }

      /* ===== AVATAR — Neumorphic Raised (Convex) ===== */
      /* Elemen timbul dari permukaan card — light source dari kiri atas */
      .initials {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: rgba(20, 30, 50, 0.9); /* Near-card color for neo effect */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: -0.03em;
        color: var(--status-color, var(--text-primary));
        flex-shrink: 0;
        position: relative;
        transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        /* Dual-shadow neumorphic raise: terang kiri atas, gelap kanan bawah */
        box-shadow:
          -5px -5px 12px rgba(255, 255, 255, 0.05),
           5px  5px 12px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      /* Icon inside avatar */
      .initials .material-icons-round {
        font-size: 22px;
        color: inherit;
      }

      /* Sidebar: smaller avatar */
      .sidebar-panel .initials {
        width: 36px !important;
        height: 36px !important;
        min-width: 36px !important;
        border-radius: 10px;
        font-size: 11px;
        box-shadow:
          -3px -3px 8px rgba(255, 255, 255, 0.04),
           3px  3px 8px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .sidebar-panel .initials .material-icons-round {
        font-size: 17px;
      }

      /* Light mode avatar neomorphic */
      [data-theme="light"] .initials {
        background: #eef2f7;
        box-shadow:
          -5px -5px 12px rgba(255, 255, 255, 0.95),
           5px  5px 12px rgba(163, 177, 198, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 1);
      }

      /* Info */
      .info-col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .doc-name {
        font-size: 12px; /* Nama dokter — kecil, di bawah spesialisasi */
        font-weight: 600;
        color: var(--text-secondary);
        /* Izinkan wrap agar nama panjang tidak terpotong */
        white-space: normal;
        overflow: visible;
        word-break: break-word;
        line-height: 1.3;
        letter-spacing: 0;
      }

      .doc-spec {
        font-size: 20px; /* Spesialisasi — BESAR & Prominent */
        font-weight: 800;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-bottom: 2px;
        line-height: 1.1;
      }

      /* Meta */
      .meta-col {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        flex-shrink: 0;
      }

      /* ===== STATUS PILL — Neumorphic Raised Convex ===== */
      .status-pill {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(20, 30, 50, 0.8); /* near-card dark for neo effect */
        color: var(--status-color);
        border: none; /* Hapus border — shadow menggantikan */
        display: flex;
        align-items: center;
        gap: 5px;
        position: relative;
        /* Raised neumorphic pill: timbul dari card surface */
        box-shadow:
          -3px -3px 8px rgba(255, 255, 255, 0.05),
           3px  3px 8px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.07),
          /* inner color tint dari status */
          inset 0 0 0 1px rgba(var(--status-color, 0,0,0), 0);
        /* Color indicator subtle inset tint */
        background-image: linear-gradient(
          135deg,
          rgba(0,0,0,0) 0%,
          var(--status-bg) 100%
        );
      }

      /* Light mode status pill */
      [data-theme="light"] .status-pill {
        background: #eef2f7;
        background-image: linear-gradient(135deg, rgba(0,0,0,0) 0%, var(--status-bg) 100%);
        box-shadow:
          -3px -3px 8px rgba(255, 255, 255, 0.95),
           3px  3px 8px rgba(163, 177, 198, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 1);
      }
      
      /* The Pulse Dot next to active pills */
      .platter.active .status-pill::after {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: var(--status-color);
        animation: ecg-pulse 2s infinite;
        margin-left: 4px;
      }

      /* Jam / Call Info */
      .jam-box {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .jam-label {
        font-size: 9px;
        font-weight: 700;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 1px;
        color: var(--text-secondary);
      }

      .jam-val {
        font-size: 15px;
        font-weight: 900;
        color: var(--status-color);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      /* ===== STATUS COLOR PALETTE 2026 — High-Contrast Clinical ===== */
      /* PRAKTEK: Vivid Emerald — Pasien BOLEH masuk, paling nyata */
      .st-praktek    { --status-color: #00C96B; --status-bg: rgba(0, 201, 107, 0.12); }
      /* PENDAFTARAN: Amber Gold — Loket buka, harap mendaftar */
      .st-pendaftaran { --status-color: #F5A623; --status-bg: rgba(245, 166, 35, 0.12); }
      /* TERJADWAL: Indigo Blue — Akan datang, belum mulai */
      .st-terjadwal  { --status-color: #5E8CF4; --status-bg: rgba(94, 140, 244, 0.12); opacity: 0.85; }
      /* SELESAI: Slate — Tidak perlu ditonjolkan */
      .st-selesai    { --status-color: #6B7A99; --status-bg: rgba(107, 122, 153, 0.1); opacity: 0.55; }
      /* PENUH: Deep Orange — Jangan mendaftar, tapi bukan darurat */
      .st-penuh      { --status-color: #FF6B35; --status-bg: rgba(255, 107, 53, 0.12); }
      /* OPERASI: Electric Violet — Tindakan khusus berlangsung */
      .st-operasi    { --status-color: #A855F7; --status-bg: rgba(168, 85, 247, 0.12); }
      /* CUTI: Slate-Red — Tidak aktif, tanpa kesan darurat */
      .st-cuti       { --status-color: #94A3B8; --status-bg: rgba(148, 163, 184, 0.1); opacity: 0.7; }
      /* LIBUR: tersembunyi total */
      .st-libur      { --status-color: #64748B; --status-bg: rgba(100, 116, 139, 0.08); display: none; }

      /* Sembunyikan Jam Daftar untuk status yang tidak menerima pendaftaran baru (menghindari info membingungkan/ganda) */
      .st-selesai .jam-box,
      .st-penuh .jam-box,
      .st-operasi .jam-box,
      .st-cuti .jam-box,
      .st-libur .jam-box {
        display: none !important;
      }

      .st-praktek .initials    { background: rgba(0, 201, 107, 0.18); color: #00C96B; }
      .st-pendaftaran .initials { background: rgba(245, 166, 35, 0.18); color: #F5A623; }
      .st-terjadwal .initials   { background: rgba(94, 140, 244, 0.18); color: #5E8CF4; }
      .st-selesai .initials     { background: rgba(107, 122, 153, 0.15); color: #6B7A99; }
      .st-penuh .initials       { background: rgba(255, 107, 53, 0.18); color: #FF6B35; }
      .st-cuti .initials        { background: rgba(148, 163, 184, 0.15); color: #94A3B8; }
      .st-operasi .initials     { background: rgba(168, 85, 247, 0.18); color: #A855F7; }

      .platter.st-praktek, .platter.st-pendaftaran { z-index: 5; }
      .platter.st-praktek    { background: rgba(0, 201, 107, 0.08); border-color: rgba(0, 201, 107, 0.3); }
      .platter.st-pendaftaran { background: rgba(245, 166, 35, 0.08); border-color: rgba(245, 166, 35, 0.3); animation: pendaftaran-pulse 2.5s ease-in-out infinite; }
      @keyframes pendaftaran-pulse {
        0%, 100% { border-color: rgba(245,166,35,0.2); box-shadow: none; }
        50%       { border-color: rgba(245,166,35,0.7); box-shadow: 0 0 0 3px rgba(245,166,35,0.08); }
      }

      [data-theme="light"] .platter.st-praktek    { background: rgba(0, 201, 107, 0.05); border-color: rgba(0, 201, 107, 0.18); }
      [data-theme="light"] .platter.st-pendaftaran { background: rgba(245, 166, 35, 0.05); }

      /* st-buka: Panel Bedah & NonBedah — PRAKTEK/PENDAFTARAN */
      .st-buka { --status-color: #00C96B; --status-bg: rgba(0, 201, 107, 0.12); }
      .st-buka .initials { background: rgba(0, 201, 107, 0.18); color: #00C96B; }
      .platter.st-buka { border-color: rgba(0, 201, 107, 0.2); }
      .platter.st-buka.active { background: rgba(0, 201, 107, 0.1) !important; border-color: rgba(0, 201, 107, 0.5) !important; }
      [data-theme="light"] .platter.st-buka { background: rgba(0, 201, 107, 0.04); border-color: rgba(0, 201, 107, 0.15); }

      /* st-buka--terjadwal: TERJADWAL — pakai Indigo */
      .st-buka.st-terjadwal { --status-color: #5E8CF4; --status-bg: rgba(94, 140, 244, 0.12); opacity: 0.85; }
      .st-buka.st-terjadwal .initials { background: rgba(100, 210, 255, 0.15); color: #64d2ff; }
      .platter.st-buka.st-terjadwal { border-color: rgba(100, 210, 255, 0.2); }
      [data-theme="light"] .platter.st-buka.st-terjadwal { background: rgba(100, 210, 255, 0.04); border-color: rgba(100, 210, 255, 0.15); }
      
      /* ===== ACTIVE CALL HIGHLIGHT (NEW) ===== */

      .platter-main {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
      }

      /* ===== CARD ENTRANCE STAGGER ANIMATION 2026 ===== */
      /* Setiap kartu masuk dengan delay cascading — lebih hidup dan tidak statis */
      @keyframes card-enter {
        0%   { opacity: 0; transform: translateY(14px) scale(0.97); }
        60%  { opacity: 1; transform: translateY(-2px) scale(1.005); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .platter[data-entering] {
        animation: card-enter 0.45s cubic-bezier(0.34, 1.15, 0.64, 1)
                   calc(var(--stagger, 0) * 55ms) both;
      }

      /* ===== CARD HOVER MICRO-INTERACTION ===== */
      /* Subtle translateY — hanya pada non-TV dan non-active card */
      @media (hover: hover) {
        .platter:not(.active):hover {
          transform: translateY(-3px) translateZ(0);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.15),
            0 10px 30px -4px rgba(0, 0, 0, 0.2);
          border-color: color-mix(in srgb, var(--status-color) 35%, var(--platter-border));
          cursor: default;
        }
      }

      /* ===== STATUS PILL POP ANIMATION on Change ===== */
      @keyframes pill-pop {
        0%   { transform: scale(0.8); opacity: 0.6; }
        60%  { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }
      .status-pill.changed {
        animation: pill-pop 0.4s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      }

      .platter.active {
        z-index: 100;
        background: var(--status-bg) !important;
        /* Multi-layer shadow: elevation + glow + inner highlight */
        box-shadow:
          0 20px 60px -12px rgba(0, 0, 0, 0.45),
          0 8px 24px -4px rgba(0, 0, 0, 0.25),
          0 0 0 1px var(--status-color),
          inset 0 1px 0 rgba(255, 255, 255, 0.18) !important;
        padding-bottom: 2px;
        /* Float forward — depth elevation 2026 */
        transform: translateY(-4px) translateZ(0);
        opacity: 1 !important;
        border-color: var(--status-color) !important;
      }

      /* ===== AMBIENT GLOW — diganti dengan neumorfisme, tidak pakai glow ===== */
      .platter.active::after {
        display: none; /* Glow dihapus — neumorphisme menggantikan */
      }

      /* Hapus info ganda: Sembunyikan jam kecil di atas saat panel detail terbuka */
      .platter.active .jam-box {
        display: none !important;
      }

      /* Light Mode active card */
      [data-theme="light"] .platter.active {
        background: rgba(255, 255, 255, 0.9) !important;
        box-shadow:
          0 20px 60px -12px rgba(0, 0, 0, 0.15),
          0 8px 24px -4px rgba(0, 0, 0, 0.08),
          0 0 0 1px var(--status-color),
          inset 0 1px 0 rgba(255, 255, 255, 1) !important;
        color: #000 !important;
      }

      /* Remove left bar for active (replaced by box-shadow ring) */
      .platter.active::before {
        opacity: 0.9;
        left: 20px;
        right: 20px;
        background: linear-gradient(
          to right,
          transparent,
          var(--status-color),
          transparent
        );
      }

      /* ===== ACTIVE CARD AVATAR — Neumorphic Active State ===== */
      /* Saat aktif: avatar berubah menjadi raised dengan warna status ===== */
      .platter.active .initials {
        background: var(--status-color);
        color: #fff;
        border: none;
        /* Convex raise dengan warna status — lebih premium dari glow biasa */
        box-shadow:
          -4px -4px 10px rgba(255, 255, 255, 0.1),
           4px  4px 10px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      }

      [data-theme="light"] .platter.active .initials {
        box-shadow:
          -4px -4px 10px rgba(255, 255, 255, 0.8),
           4px  4px 10px rgba(0, 0, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      .platter.active .doc-spec {
        font-size: 22px; /* Spesialisasi lebih besar saat aktif */
        color: #ffffff !important;
        font-weight: 900;
        letter-spacing: 0.02em;
      }
      
      .platter.active .doc-name {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75) !important;
        font-weight: 600;
        white-space: normal;
        overflow: visible;
      }
      
      /* ECG Radar Pulse Indicator */
      @keyframes ecg-pulse {
        0% { transform: scale(0.9); box-shadow: 0 0 0 0 var(--status-color); }
        70% { transform: scale(1); box-shadow: 0 0 0 6px transparent; }
        100% { transform: scale(0.9); box-shadow: 0 0 0 0 transparent; }
      }

      [data-theme="light"] .platter.active .doc-name {
        color: rgba(0, 0, 0, 0.7) !important;
      }
      [data-theme="light"] .platter.active .doc-spec {
        color: #000 !important;
      }

      [data-theme="light"] .platter.active .detail-label {
        color: rgba(0, 0, 0, 0.6);
      }

      [data-theme="light"] .platter.active .detail-time {
        color: #000;
      }

      /* ===== EXPANDED DETAIL (NEW) ===== */
      .platter-detail {
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        border-top: 1px solid rgba(255, 255, 255, 0);
        margin-top: 0;
        padding-top: 0;
      }

      /* #2: Border Expanded Detail Adaptif untuk Light Mode */
      [data-theme="light"] .platter.active .platter-detail {
        border-top: 1px solid rgba(0, 0, 0, 0.08);
      }

      /* ===== EXPANDED DETAIL PANEL — Neumorphic Recessed (Concave) ===== */
      /* Panel detail saat kartu aktif: terasa seperti 'ditekan ke dalam' card */
      .platter.active .platter-detail {
        max-height: 120px;
        opacity: 1;
        margin-top: 12px;
        padding-top: 14px;
        padding-bottom: 4px;
        border-top: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        /* Recessed / inset neumorphic — terasa cekung masuk ke permukaan */
        background: rgba(8, 14, 28, 0.6);
        border-radius: 14px;
        padding: 14px 16px 12px;
        box-shadow:
          inset -3px -3px 8px rgba(255, 255, 255, 0.04),
          inset  3px  3px 8px rgba(0, 0, 0, 0.5),
          inset  0     1px  0   rgba(255, 255, 255, 0.04);
        margin-left: -4px;
        margin-right: -4px;
      }

      [data-theme="light"] .platter.active .platter-detail {
        background: rgba(220, 228, 238, 0.8);
        box-shadow:
          inset -3px -3px 8px rgba(255, 255, 255, 0.9),
          inset  3px  3px 8px rgba(163, 177, 198, 0.5);
        border-top: none;
      }

      .detail-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .detail-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        opacity: 0.7;
        color: rgba(255, 255, 255, 0.9);
      }

      .detail-time {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
      }

      /* ===== LIVE STATUS BADGE — Neumorphic Convex ===== */
      /* Badge 'SEDANG MELAYANI' timbul seperti embossed button */
      .live-status {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--status-color);
        color: white;
        padding: 7px 16px;
        border-radius: 20px;
        border: none;
        /* Neumorphic raised badge dengan warna status */
        box-shadow:
          -4px -4px 10px rgba(255, 255, 255, 0.08),
           4px  4px 10px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2);
      }

      .pulse-dot {
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        animation: pulse-white 2s infinite;
      }

      .live-text {
        font-size: 11px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 0.6px;
        text-transform: uppercase;
      }

      /* Pulse: Offload GPU animation to opacity only */
      @keyframes pulse-white {
        0% {
          opacity: 0.6;
        }

        50% {
          opacity: 1;
        }

        100% {
          opacity: 0.6;
        }
      }

      .st-operasi.active .pulse-dot {
        background: #ff9f0a;
        /* Orange alert */
      }

      @keyframes pulse-warn {
        /* Dimatikan transform-scale nya untuk hindari freeze / reflow berat */
        0% {
          opacity: 0.6;
        }

        100% {
          opacity: 1;
        }
      }

      /* ===== DYNAMIC ISLAND (NEW) ===== */
      .dynamic-island {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%) scale(0);
        height: 54px;
        width: 32px;
        background: #000;
        border-radius: 27px;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.4s ease,
          width 0.4s ease,
          opacity 0.3s ease;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        opacity: 0;
        will-change: transform, opacity;
      }

      .dynamic-island.expanded {
        transform: translateX(-50%) scale(1);
        opacity: 1;
        width: 320px;
        height: 54px;
        border-radius: 27px;
      }

      .di-content {
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transform: scale(0.9);
        transition: all 0.3s ease;
        width: 100%;
        padding: 0 16px;
      }

      .dynamic-island.expanded .di-content {
        opacity: 1;
        transform: scale(1);
      }

      .di-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid #30d158;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .di-icon {
        font-size: 20px;
        color: #fff;
      }

      .di-text {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }

      .di-title {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.6);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .di-msg {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
      }

      .di-warn .di-spinner {
        border-top-color: #ff453a;
      }

      .di-warn .di-msg {
        color: #ff453a;
      }

      .material-icons-round.di-icon {
        color: #fff;
      }

      /* Use a success class added via JS instead of invalid pseudo-selectors */
      .di-success .di-icon {
        color: #30d158;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      /* ===== FOOTER ===== */
      .footer {
        height: 48px;
        background: var(--footer-bg);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        border: 1px solid var(--border-light);
        overflow: hidden;
        flex-shrink: 0;
        transition: background 0.5s ease;
        /* Subtle top shimmer on footer same as cards */
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      /* Ticker gradient fade on edges */
      .ticker::before,
      .ticker::after {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        width: 40px;
        z-index: 2;
        pointer-events: none;
      }
      .ticker::before {
        left: 0;
        background: linear-gradient(to right, var(--footer-bg), transparent);
      }
      .ticker::after {
        right: 0;
        background: linear-gradient(to left, var(--footer-bg), transparent);
      }

      .legend {
        display: flex;
        gap: 16px;
        padding-right: 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      .lg-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        opacity: 0.7;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .ticker {
        flex: 1;
        margin: 0 20px;
        position: relative;
        overflow: hidden;
        height: 100%;
        display: flex;
        align-items: center;
      }

      .ticker-inner {
        white-space: nowrap;
        animation: marquee 30s linear infinite;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(-100%);
        }
      }

      .status-pill-lg {
        background: rgba(125, 125, 125, 0.15);
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-primary);
      }

      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #30d158;
        /* box-shadow: 0 0 8px #30D158; */
      }

      .live-dot.warn {
        background: #ff9f0a;
        box-shadow: none;
        animation: blink 1s infinite;
      }

      @keyframes blink {
        50% {
          opacity: 0.5;
        }
      }

      /* ===== SKELETON ===== */
      .skel {
        background: rgba(125, 125, 125, 0.1);
        border-radius: 4px;
        animation: pulse-bg 1.5s infinite;
      }

      @keyframes pulse-bg {
        0% {
          opacity: 0.6;
        }

        50% {
          opacity: 1;
        }

        100% {
          opacity: 0.6;
        }
      }

      /* ===== SIDEBAR SECTION HEADER (Grouped by Status) ===== */
      .sidebar-section-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px 4px 10px;
        margin-top: 2px;
      }

      .sidebar-section-dot {
        /* Pill shape 2026 — bukan dot bulat kecil */
        width: 16px;
        height: 5px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .sidebar-section-label {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: rgba(0, 0, 0, 0.5);
      }

      [data-theme="dark"] .sidebar-section-label {
        color: rgba(255, 255, 255, 0.45);
      }

      .sidebar-section-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          rgba(125, 125, 125, 0.12),
          transparent
        );
      }

      .sidebar-section-count {
        font-size: 9px;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.3);
        background: rgba(0, 0, 0, 0.04);
        padding: 1px 6px;
        border-radius: 4px;
      }

      [data-theme="dark"] .sidebar-section-count {
        color: rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.06);
      }

      /* ===== ANIMASI SLIDE-IN (Item Baru) ===== */
      @keyframes slideInRight {
        0% {
          opacity: 0;
          transform: translateX(30px) scale(0.95);
        }

        60% {
          opacity: 1;
          transform: translateX(-4px) scale(1.01);
        }

        100% {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      .platter-new {
        animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      /* ===== THEMES (Overridden by root var logic for simplicity in this proactive mode) ===== */
      /* Using pure dark mode standard for "Professional Display" look */

      /* ===== MOBILE RESPONSIVE (Smartphone) ===== */
      @media (max-width: 768px) {
        html,
        body {
          overflow-y: auto !important;
          /* Allow native scrolling */
          height: auto !important;
          -webkit-overflow-scrolling: touch;
        }

        .app-container {
          height: auto !important;
          min-height: 100vh;
          flex-direction: column;
          /* Stack vertically */
          padding: 12px;
          gap: 24px;
          overflow: visible;
        }

        /* Header Adjustments */
        .header {
          padding: 0 4px;
          margin-bottom: 12px;
        }

        .header .brand {
          gap: 12px;
        }

        .logo-box {
          width: 40px;
          height: 40px;
        }

        .title-group h1 {
          font-size: 16px;
        }

        /* Sidebar becomes top section */
        .sidebar-panel {
          flex: none;
          width: 100%;
          max-width: none;
          margin-right: 0;
          margin-bottom: 16px;
          position: relative;
          z-index: 20;
        }

        .sidebar-panel .island-header {
          position: sticky;
          top: 0;
          z-index: 5;
          background: var(--card-bg);
          /* Ensure visibility when sticky */
          backdrop-filter: blur(10px);
        }

        /* Content Stack */
        .content {

      // ===== PROFESSIONAL SCROLLER (Item-by-Item with Easing) =====
      // Pola: Scroll satu item → pause → scroll item berikutnya → ... → sampai bawah → pause lama → fade reset ke atas → ulangi
      class SmoothScroller {
        constructor(id) {
          this.el = $(id);
          this.y = 0;
          this.targetY = 0;
          this.currentItem = 0;
          this.itemOffsets = []; // Posisi Y setiap item (kartu)
          this.active = true;
          this.animating = false;
          this.h = 0; // scrollHeight
          this.vh = 0; // viewportHeight
          this.timer = null;

          window.addEventListener("resize", () => this.updateMetrics());
        }

        // Hitung posisi setiap item kartu
        updateMetrics() {
          if (!this.el) return;
          this.h = this.el.scrollHeight;
          this.vh = this.el.parentElement.clientHeight;

          // Bangun array offset posisi tiap item
          this.itemOffsets = [];
          const children = this.el.children;
          for (let i = 0; i < children.length; i++) {
            this.itemOffsets.push(children[i].offsetTop);
          }

          // Jika konten tidak perlu scroll, reset
          if (this.h <= this.vh) {
            this.y = 0;
            this.targetY = 0;
            this.currentItem = 0;
            this.el.style.transform = "translate3d(0,0,0)";
            this.el.style.opacity = "1";
          }
        }

        // Easing: Cubic ease-in-out — pelan di awal & akhir, cepat di tengah
        _ease(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // Animasi scroll dari posisi saat ini ke target
        _animateTo(target, duration, callback) {
          if (this.animating) return;
          this.animating = true;
          const startY = this.y;
          const delta = target - startY;

          if (Math.abs(delta) < 1) {
            this.animating = false;
            if (callback) callback();
            return;
          }

          let startTime = null;
          const step = (timestamp) => {
            if (!this.active) {
              this.animating = false;
              return;
            }
            if (!startTime) startTime = timestamp;

            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easedProgress = this._ease(progress);

            this.y = startY + delta * easedProgress;
            this.el.style.transform = `translate3d(0, -${this.y}px, 0)`;

            if (progress < 1) {
              // Jika mode tv optimized, pelankan simulasi ke ~30FPS untuk mendinginkan CPU
              if (document.body.classList.contains("tv-optimized")) {
                setTimeout(() => step(performance.now()), 33);
              } else {
                requestAnimationFrame(step);
              }
            } else {
              this.y = target;
              this.el.style.transform = `translate3d(0, -${this.y}px, 0)`;
              this.animating = false;
              if (callback) callback();
            }
          };
          requestAnimationFrame(step);
        }

        // Fade out → reset ke atas → fade in (loop seamless)
        _fadeResetToTop(callback) {
          // Fade out
          this.el.style.transition = "opacity 0.5s ease";
          this.el.style.opacity = "0";

          setTimeout(() => {
            // Snap ke atas (tersembunyi)
            this.y = 0;
            this.targetY = 0;
            this.currentItem = 0;
            this.el.style.transition = "none";
            this.el.style.transform = "translate3d(0, 0, 0)";

            // Force reflow
            void this.el.offsetHeight;

            // Fade in
            this.el.style.transition = "opacity 0.5s ease";
            this.el.style.opacity = "1";

            setTimeout(() => {
              this.el.style.transition = "";
              if (callback) callback();
            }, 500);
          }, 500);
        }

        // Loop utama: scroll item demi item
        _scheduleNext() {
          if (!this.active) return;
          if (this.h <= this.vh) return; // Tidak perlu scroll

          const maxScroll = this.h - this.vh;

          // Hitung berapa item yang masih bisa di-scroll
          // Cari item berikutnya yang offset-nya masih dalam batas
          let nextItem = this.currentItem + 1;

          // Pastikan ada item berikutnya
          if (nextItem < this.itemOffsets.length) {
            // Scroll ke item berikutnya — clamp ke maxScroll agar tidak overshoot
            this.currentItem = nextItem;
            // Jika item terakhir atau offset melebihi maxScroll, scroll ke maxScroll
            // agar konten paling bawah terlihat sepenuhnya
            this.targetY = Math.min(this.itemOffsets[nextItem], maxScroll);
            if (this.y >= maxScroll - 1) {
              // Sudah di posisi paling bawah, tidak perlu scroll lagi
              this.timer = setTimeout(() => {
                this._fadeResetToTop(() => {
                  this.timer = setTimeout(
                    () => this._scheduleNext(),
                    CFG.SCROLL_EDGE_PAUSE,
                  );
                });
              }, CFG.SCROLL_EDGE_PAUSE);
              return;
            }

            this._animateTo(this.targetY, CFG.SCROLL_DURATION, () => {
              // Pause setelah sampai, lalu lanjut
              this.timer = setTimeout(
                () => this._scheduleNext(),
                CFG.SCROLL_ITEM_PAUSE,
              );
            });
          } else {
            // Sudah melewati semua item — scroll ke maxScroll jika belum
            if (this.y < maxScroll - 1) {
              this._animateTo(maxScroll, CFG.SCROLL_DURATION, () => {
                this.timer = setTimeout(() => {
                  this._fadeResetToTop(() => {
                    this.timer = setTimeout(
                      () => this._scheduleNext(),
                      CFG.SCROLL_EDGE_PAUSE,
                    );
                  });
                }, CFG.SCROLL_EDGE_PAUSE);
              });
            } else {
              // Sudah di ujung bawah — pause lama, lalu fade reset
              this.timer = setTimeout(() => {
                this._fadeResetToTop(() => {
                  // Pause di atas, lalu mulai scroll lagi
                  this.timer = setTimeout(
                    () => this._scheduleNext(),
                    CFG.SCROLL_EDGE_PAUSE,
                  );
                });
              }, CFG.SCROLL_EDGE_PAUSE);
            }
          }
        }

        start() {
          // Pause awal di posisi atas sebelum mulai scroll
          this.timer = setTimeout(
            () => this._scheduleNext(),
            CFG.SCROLL_EDGE_PAUSE,
          );
        }

        reset() {
          // Bersihkan semua timer dan state
          if (this.timer) clearTimeout(this.timer);
          this.animating = false;
          this.y = 0;
          this.targetY = 0;
          this.currentItem = 0;
          if (this.el) {
            this.el.style.transition = "none";
            this.el.style.transform = "translate3d(0, 0, 0)";
            this.el.style.opacity = "1";
          }
          // Restart cycle setelah metrics diupdate
          this.timer = setTimeout(
            () => this._scheduleNext(),
            CFG.SCROLL_EDGE_PAUSE,
          );
        }
      }

      const isMobile = window.innerWidth <= 768;

      // Dynamic Island Controller (with Queue)

        init() {

        startIdleCycle() {

        // show(title, msg, type, [icon], [duration])
        async show(title, msg, type = "info", arg4 = null, arg5 = null) {
          let duration = 8000;
          let icon = null;

          // Overload handling
          if (typeof arg4 === "number") {
            duration = arg4;
          } else if (typeof arg4 === "string") {
            icon = arg4;
            if (typeof arg5 === "number") duration = arg5;
          }

          // Default icons
          if (!icon) {
            if (type === "success") icon = "check_circle";
            else if (type === "warn") icon = "warning";
            else if (type === "error") icon = "error";
            else if (type === "info") icon = "info";
            else if (type === "idle") icon = "notifications";
          }

          this._queue.push({ title, msg, type, icon, duration });
          this.processQueue();
        },

        async processQueue() {
          if (this._isAnimating || this._queue.length === 0) return;

          this._isAnimating = true;
          const item = this._queue.shift();

          // 1. Reset Classes
          this._el.className = `dynamic-island ${item.type}`;

          // 2. Set Content
          $("diTitle").textContent = item.title;
          $("diMsg").textContent = item.msg;
          // 3. Set Icon
          const iconEl = this._icon;
          if (iconEl) {
            iconEl.textContent = item.icon || "info";
            // Fix: Reset class to remove spinner
            iconEl.className = "material-icons-round di-icon";
          }

          // Force layout recalc to restart transitions cleanly
          void this._el.offsetWidth;

          // 4. Expand Animation (in next frame for smoothness)
          requestAnimationFrame(() => {
            this._el.classList.add("expanded");
          });

          // 5. Wait Notification Duration
          await new Promise((r) => setTimeout(r, item.duration));

          // 5. Collapse Animation
          this._el.classList.remove("expanded");

          // 6. Cleanup & Next
          setTimeout(() => {
            this._isAnimating = false;
            this._el.className = "dynamic-island"; // Reset to base
            this.processQueue();
          }, 600); // 0.6s match CSS liquid render
        },
      };

      // Main App Logic
      const App = {
        _data: { doctors: [], shifts: [], leaves: [], settings: {} },
        _prevDoctors: {}, // Track previous doctor states for change detection
        _greetSent: {}, // Track which greetings have been sent today

        _operasiDoctors: [], // Melacak dokter-dokter spesifik yang berada di Ruang Operasi
        _opCycleIdx: 0,

        // Jadwal Sholat Statis (Purbalingga) untuk Hitung Mundur
        _prayTimes: [
          { id: "Dzuhur", h: 12, m: 2 },
          { id: "Ashar", h: 15, m: 18 },
          { id: "Maghrib", h: 18, m: 3 },
        ],
        _activePrayCountdown: null,

        _customMsgIdx: 0,
        _customMsgs: [
          { title: "Info", text: "Terimakasih sudah menunggu 🙏" },
          { title: "Info", text: "Terimakasih sudah tertib 🌟" },
          { title: "Antrian", text: "Belum online? Yo ambil antrian 🎫" },

        ],

        _isFetching: false, // Network lock
        _infoMsgIdx: 0,
        _infoMsgs: [
          "Pasien dengan status <strong>PENUH</strong> mohon mendaftar di hari lain.",

        async init() {
          Island.init(); // Initialize Dynamic Island

          // --- SMART TV OPTIMIZATION DETECTOR ---
          const ua = navigator.userAgent.toLowerCase();
          if (
            ua.includes("webos") ||
            ua.includes("tizen") ||

          // Greeting based on time

          const greeting =

                  ? "Selamat Sore"

          // Menyatukan semua interval aplikasi (Clock, Fetch, Idle Island, Operasi, Theme) ke dalam satu timer agar lebih sinkron dan ringan di memori
          let tick = 0;
          setInterval(() => {
            this.clock();
            tick++;

            if (tick % 8 === 0) this.updateInfoBox(); // Info box setiap 8 detik
            if (tick % 60 === 0) this.updateTheme(); // Tema setiap 60 detik (1 menit)
            // Diganti: this.fetch() dinonaktifkan karena sekarang pakai SSE realtime
            if (tick % 10 === 0) this.checkBroadcast(); // Emergency broadcast polling setiap 10 detik

            // Island Idle Cycle (setiap 180 detik / 3 menit)
            if (
              tick % 180 === 0 &&
              Island._queue.length === 0 &&

            ) {
              Island.show(

                Island.getIdleMessage(),
                "idle",
                "tips_and_updates",

              );

            // Notifikasi Ruang Operasi (setiap 300 detik / 5 menit)
            if (

            ) {
              const dr = this._operasiDoctors[this._opCycleIdx];
              Island.show(

                "local_hospital",

              this._opCycleIdx =
                (this._opCycleIdx + 1) % this._operasiDoctors.length;

          }, 1000);

          this.clock();
          this.updateTheme();
          this.skel();

          // Start SSE Realtime Connection
          this.connectRealtime();

          this.updateInfoBox();
          if (!isMobile) {
            s1.start();
            s2.start();
            s3.start();
          }

          // Watchdog: Auto-reload every 1 hour to clear memory (3600 detik)
          setTimeout(() => window.location.reload(), 3600000);
        },

        clock() {
          const d = new Date();

          // Cache DOM updates untuk mencegah reflow tiap detik di TV low end
          const clockVal = d.toLocaleTimeString("id-ID", {
            hour: "2-digit",
            minute: "2-digit",
          });
          const clockEl = $("clock");
          if (clockEl && clockEl.textContent !== clockVal)
            clockEl.textContent = clockVal;

          const dateVal = d
            .toLocaleDateString("id-ID", {
              weekday: "long",
              day: "numeric",
              month: "long",
            })
            .toUpperCase();
          const dateEl = $("date");
          if (dateEl && dateEl.textContent !== dateVal)
            dateEl.textContent = dateVal;

          const h = d.getHours();
          const m = d.getMinutes();
          const s = d.getSeconds();

          // --- AUTOMATIC CLINICAL DAY/NIGHT THEME ---
          // Light Theme: 06:00 - 17:59 | Dark Theme: 18:00 - 05:59
          const prefersTheme = (h >= 6 && h < 23) ? "light" : "dark";
          if (document.documentElement.getAttribute('data-theme') !== prefersTheme) {
              document.documentElement.setAttribute('data-theme', prefersTheme);
          }

          // Custom Rotating Notification every 5 minutes (avoid clash with break time at 12:00)
          if (m % 5 === 0 && s === 0 && h !== 12) {
            const msg = this._customMsgs[this._customMsgIdx];
            Island.show(msg.title, msg.text, "info", 6000);
            this._customMsgIdx =
              (this._customMsgIdx + 1) % this._customMsgs.length;
          }

          // Sholat Countdown Logic (15 menit sebelum masuknya waktu)
          const currentTotalMins = h * 60 + m;
          let prayCountdownActive = false;

          for (const p of this._prayTimes) {
            const prayMins = p.h * 60 + p.m;
            const diffMins = prayMins - currentTotalMins;

            // Jika berada di rentang 1 hingga 15 menit SEBELUM masuk sholat
            if (diffMins > 0 && diffMins <= 15) {
              prayCountdownActive = true;
              if (s === 0 && this._activePrayCountdown !== p.id) {
                this._activePrayCountdown = p.id;
                Island.show(
                  "Waktu Sholat",
                  `${diffMins} Menit Menuju Waktu ${p.id} 🕌`,
                  "info",
                  "access_time",
                  6000,
                );
              }

              // Hitung mundur visual di bottom left
              const remainingSeconds = 60 - s;
              const displayMins = diffMins - 1; // contoh: dif 15m, di menit 14:59 kita tampilkan 14.

              const mm = displayMins.toString().padStart(2, "0");
              const ss =
                remainingSeconds === 60
                  ? "00"
                  : remainingSeconds.toString().padStart(2, "0");
              this.status(
                `[${mm}:${ss}] MENUJU WAKTU ${p.id.toUpperCase()} 🕌`,
                true,
              );
              break;
            }
            // Tepat saat Waktu Sholat Tiba
            else if (diffMins === 0 && s === 0) {
              this._activePrayCountdown = null;
              this.status("LIVE STREAM", false);
              Island.show(
                "Waktu Sholat",
                `Waktu ${p.id} Telah Tiba 🕌`,
                "success",
                "access_time",
                8000,
              );

              // Audio dibuang sepenuhnya untuk performa memori Smart TV yang lebih baik
            }
          }

          if (!prayCountdownActive && this._activePrayCountdown) {
            this._activePrayCountdown = null;
            if (!this._isFetching) this.status("LIVE STREAM", false);
          }

          // Time-based Greetings (fire once at the exact hour)
          if (s === 0 && m === 0) {
            const key = "greet_" + h;
            if (!this._greetSent[key]) {
              this._greetSent[key] = true;
              if (h === 6) Island.show("Pagi", "Selamat Pagi 🌅", "info", 4000);
              if (h === 12)
                Island.show("Siang", "Selamat Siang ☀️", "info", 4000);
              if (h === 18)
                Island.show("Sore", "Selamat Sore 🌇", "info", 4000);
            }
          }
        },

        connectRealtime() {
          const es = new EventSource("/api/stream/live");

          // Legacy/Initial snapshot (unnamed)
          es.onmessage = (e) => {
            try {
              const res = JSON.parse(e.data);
              if (res && res.doctors) this.processData(res);
            } catch (err) {
              console.error("Snapshot Error:", err);
            }
          };

          // Modern named events
          const events = ["doctors", "shifts", "leaves", "settings"];
          events.forEach((eventName) => {
            es.addEventListener(eventName, (e) => {
              try {
                const data = JSON.parse(e.data);
                this.processData({ [eventName]: data });
              } catch (err) {
                console.error(`SSE ${eventName} Error:`, err);
              }
            });
          });

          es.onerror = () => {
            Island.show(
              "Koneksi",
              "Mencoba menyambung kembali...",
              "warn",
              5000,
            );
            this.status("OFFLINE MODE", true);
          };
        },

        processData(partial) {
          if (!partial) return;
          this._data = { ...this._data, ...partial };
          const res = this._data;

          this._isFetching = true;

          try {
            const doctors = res.doctors || [];
            const shifts = res.shifts || [];
            const leaves = res.leaves || [];

            // Get today's info
            const now = new Date();
            const todayDayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1; // 0=Mon, 6=Sun
            const todayStr = now.toISOString().split("T")[0];

            // Map standard format to legacy format needed by TV UI
            const mappedData = [];

            // Find shifts for today
            const todayShifts = shifts.filter(
              (s) =>
                s.dayIdx === todayDayIdx &&
                !(s.disabledDates || []).includes(todayStr),
            );

            todayShifts.forEach((shift, index) => {
              const doc = doctors.find((d) => d.id === shift.doctorId);
              if (!doc) return;

              const jamStr = shift.formattedTime || shift.title || "-";

              // Status dasar yang diputuskan server secara global untuk dokter
              let status = (doc.status || "").toUpperCase();

              // --- MULTI-SHIFT BUG FIX ---
              // Evaluasi status shift berdasarkan waktu saat ini SATU PER SATU terlepas dari status global,
              // agar shift yang sudah lewat diset SELESAI, dan yang belum diset TERJADWAL.
              if (jamStr !== "-") {
                const parts = jamStr.replace(/\s/g, "").replace(/\./g, ":").toLowerCase().match(/(\d{1,2}:\d{2})/g);
                if (parts && parts.length > 0) {
                  const parseMins = (t) => {
                    const [h, m] = t.split(":").map(Number);
                    return h * 60 + m;
                  };
                  const startMins = parseMins(parts[0]);
                  let endMins = null;
                  
                  if (parts.length >= 2) {
                    endMins = parseMins(parts[1]);
                    if (endMins < startMins) endMins += 24 * 60; // crossover midnight
                  } else if (jamStr.toLowerCase().includes("selesai")) {
                    endMins = startMins + 240; // Default 4 jam jika "sampai selesai"
                  }

                  let regMins = startMins - 30; // default 30 min buka loket
                  const rTime = shift.registrationTime || doc.registrationTime;
                  if (rTime && rTime !== "-") {
                    const rParts = rTime.replace(/\./g, ":").split(":");
                    if (rParts.length >= 2) regMins = Number(rParts[0]) * 60 + Number(rParts[1]);
                  }

                  const now = new Date();
                  const curMins = now.getHours() * 60 + now.getMinutes();

                  if (endMins !== null && curMins >= endMins) {
                    // Shift ini sudah sepenuhnya lewat
                    status = "SELESAI";
                  } else if (curMins < regMins) {
                    // Shift ini belum mulai dan loket belum buka
                    status = "TERJADWAL";
                  } else {
                    // Shift sedang berjalan. Jika global status adalah "SELESAI" / "TERJADWAL" (mungkin salah state dari shift lain),
                    // Set default jadi PRAKTEK, KECUALI status global adalah valid (PENDAFTARAN / PENUH / OPERASI / CUTI)
                    if (!["PRAKTEK", "PENDAFTARAN", "PENUH", "OPERASI", "CUTI"].includes(status)) {
                       status = "PRAKTEK";
                    }
                  }
                }
              }

              mappedData.push({
                Dokter: doc.name,
                Spesialis: doc.specialty,
                Status: status,
                Jam: jamStr,
                JamPraktek: jamStr,
                JamDaftar:
                  shift.registrationTime || doc.registrationTime || "-",
                Jenis: doc.category,
                "Code Antrian": doc.queueCode,
                _shiftId: shift.id || index,
              });
            });

            // Detect doctor status changes before render
            this._detectChanges(mappedData);

            this.render(mappedData);
            this.status("LIVE STREAM", false);
          } catch (e) {
            console.error("TV ProcessData Error:", e);
            Island.show(
              "Data Error",
              "Gagal memproses data realtime",
              "error",
              8000,
            );
          } finally {
            this._isFetching = false;
          }
        },

        _detectChanges(data) {
          if (!data) return;
          const now = {}; // { status: string, active: boolean }
          const ops = [];

          data.forEach((d) => {
            const name = (d.Dokter || "").trim();
            const st = (d.Status || "").toUpperCase();
            // Gunakan kombinasi nama + shift sebagai key agar dokter multi-shift dilacak terpisah
            const key = `${name}_${d._shiftId || d.Jam || ""}`;
            // Active logic: Inside time AND (BUKA or PENUH)
            const isNowActive = isActive(st);

            // Daftarkan ke list Ruang Operasi jika cocok
            if (st.includes("OPERASI")) ops.push(name);

            const prev = this._prevDoctors[key]; // { status, active } or undefined

            // Store current state
            now[key] = { status: st, active: isNowActive };

            if (prev && prev.status !== st) {
              if (st === "PENDAFTARAN") {
                Island.show("Loket Dibuka", `Pendaftaran poli ${name} telah dimulai`, "info", "assignment", 8000);
              } else if (st === "PRAKTEK") {
                Island.show("Praktek Dimulai", `${name} Mulai Melayani Pasien`, "success", "door_front", 8000);
              } else if (st === "PENUH") {
                 Island.show("Kuota Penuh", `Poli ${name} telah memenuhi kuota maksimal`, "warn", "front_hand", 10000);
              } else if (st === "SELESAI") {
                 Island.show("Praktek Selesai", `Pelayanan ${name} telah purna`, "info", "check_circle", 8000);
              } else if (st === "OPERASI") {
                 Island.show("Tindakan Operasi", `${name} sedang dalam tindakan operasi`, "warn", "local_hospital", 10000);
              }
            }
          });

          this._operasiDoctors = ops;
          this._prevDoctors = now;
        },

        _lastBroadcastId: null, // Track to avoid re-rendering same popup

        async checkBroadcast() {
          try {
            const res = await fetch("/api/automation");
            if (!res.ok) return; // Silent guard
            const rules = await res.json();

            // Filter rules that are active (assuming the backend returns true boolean)
            const active = rules.find(
              (r) => r.active === true || r.active === 1 || r.active === "true",
            );
            const overlay = $("broadcastOverlay");
            if (!overlay) return;

            if (active) {
              // Only update DOM if broadcast changed
              if (this._lastBroadcastId !== active.id) {
                this._lastBroadcastId = active.id;

                // Stop any closing animation if it was happening
                overlay.classList.remove("closing");

                // Set level class on overlay
                overlay.className = `broadcast-overlay active broadcast-level-${active.alertLevel}`;

                // Icon
                const iconMap = {
                  Information: "info",
                  Warning: "warning",
                  Critical: "error",
                };
                const iconEl = overlay.querySelector(
                  ".broadcast-icon-ring .material-icons-round",
                );
                if (iconEl)
                  iconEl.textContent = iconMap[active.alertLevel] || "campaign";

                // Label
                const labelEl = $("broadcastLevelLabel");
                if (labelEl)
                  labelEl.textContent = active.alertLevel.toUpperCase();

                // Message
                const msgEl = $("broadcastMessage");
                if (msgEl) msgEl.textContent = active.message;

                // Zone
                const zoneEl = $("broadcastZone");
                if (zoneEl)
                  zoneEl.textContent =
                    active.targetZone.replace("_", " ") +
                    " • " +
                    active.duration +
                    " menit";

                // Also show on Dynamic Island (debounce/protect multiple calls)
                Island.show(
                  "EMERGENCY BROADCAST",
                  active.message,
                  active.alertLevel === "Critical" ? "error" : "warn",
                  "campaign",
                  10000,
                );
              }
            } else {
              // No active broadcast — hide overlay with animation
              if (
                overlay.classList.contains("active") &&
                !overlay.classList.contains("closing")
              ) {
                this._lastBroadcastId = null;
                overlay.classList.add("closing");

                // Wait for CSS animation to finish before removing 'active' class (display:none)
                setTimeout(() => {
                  // Double check if it wasn't re-activated during the closing animation
                  if (overlay.classList.contains("closing")) {
                    overlay.classList.remove("active", "closing");
                    // Reset class back to base to purge level colors
                    overlay.className = "broadcast-overlay";
                  }
                }, 450); // Slightly larger than the 0.4s animation duration
              }
            }
          } catch (e) {
            console.error("Broadcast check failed:", e);
          }
        },

        updateInfoBox() {

          if (!el) return;
          el.style.opacity = "0";

        status(msg, warn) {
          const elTxt = $("liveText");
          if (elTxt && elTxt.textContent !== msg) elTxt.textContent = msg;

          const elDot = $("liveDot");
