        },

        render(data) {
          if (!data) return;

          // 0. Calculate Stats
          let countBuka = 0,
            countPenuh = 0,
            countCuti = 0;
          data.forEach((d) => {
            const s = (d.Status || "").toUpperCase();
            if (["PRAKTEK", "PENDAFTARAN", "TERJADWAL"].includes(s)) countBuka++;
              else if (s === "PENUH") countPenuh++;
            else if (s.includes("CUTI")) countCuti++;
          });
          $("statBuka").textContent = countBuka;
          $("statPenuh").textContent = countPenuh;
          $("statCuti").textContent = countCuti;

          const group = { Bedah: [], NonBedah: [], Sidebar: [] };

          // 1. ACTIVE List (Main Display) - Exclude Penuh, Cuti, Selesai, Tidak Praktek, Operasi
          const mainData = data.filter((d) => {
            const s = (d.Status || "").toUpperCase();
            if (
              s.includes("SELESAI") ||
              s.includes("TIDAK") ||
              s.includes("LIBUR")
            )
              return false;
            // Move Penuh, Cuti, Operasi to Sidebar
            if (
              s.includes("PENUH") ||
              s.includes("CUTI") ||
              s.includes("OPERASI")
            )
              return false;
            return true;
          });

          // 2. SIDEBAR List - Only Penuh, Cuti, Operasi
          const sidebarData = data.filter((d) => {
            const s = (d.Status || "").toUpperCase();
            if (
              s.includes("SELESAI") ||
              s.includes("TIDAK") ||
              s.includes("LIBUR")
            )
              return false;
            return (
              s.includes("PENUH") || s.includes("CUTI") || s.includes("OPERASI")
            );
          });

          [...mainData, ...sidebarData].forEach((d) => {
            const s = (d.Status || "").toUpperCase();
            d._isActive = isActive(s);
          });

          // Sorting: AKTIF (Top) -> PRAKTEK/PNDF (4) -> PENUH (3) -> TERJADWAL (2.5) -> OPERASI (2) -> CUTI (1)
          const score = (s) => {
            const u = s.toUpperCase();
            if (["PRAKTEK", "PENDAFTARAN"].includes(u)) return 4;
            if (u.includes("PENUH")) return 3;
            if (u === "TERJADWAL") return 2.5;
            if (u.includes("OPERASI")) return 2;
            if (u.includes("CUTI")) return 1;
            return 0;
          };

          const sortFn = (a, b) => {
            // Priority 1: Active
            if (a._isActive && !b._isActive) return -1;
            if (!a._isActive && b._isActive) return 1;
            // Priority 2: Status Score
            const diff = score(b.Status) - score(a.Status);
            if (diff !== 0) return diff;
            // Priority 3: Specialty (Poliklinik)
            if (a.Spesialis < b.Spesialis) return -1;
            if (a.Spesialis > b.Spesialis) return 1;
            // Priority 4: Doctor Name
            if (a.Dokter < b.Dokter) return -1;
            if (a.Dokter > b.Dokter) return 1;
            return 0;
          };

          mainData.sort(sortFn);
          sidebarData.sort(sortFn);

          // Group Main Data
          mainData.forEach((d) => {
            const g = d.Jenis === "Bedah" ? "Bedah" : "NonBedah";
            if (group[g]) group[g].push(d);
          });

          // Group Sidebar Data — terpisah per status
          group.SidebarOperasi = sidebarData.filter((d) =>
            (d.Status || "").toUpperCase().includes("OPERASI"),
          );
          group.SidebarPenuh = sidebarData.filter((d) =>
            (d.Status || "").toUpperCase().includes("PENUH"),
          );
          group.SidebarCuti = sidebarData.filter((d) =>
            (d.Status || "").toUpperCase().includes("CUTI"),
          );

          // --- DOM RECYCLING ENGINE ---
          const updateList = (containerId, list) => {
            const container = $(containerId);
            const oldMap = new Map();
            // Map existing elements by Doctor Name
            Array.from(container.children).forEach((el) => {
              if (el.dataset.id) oldMap.set(el.dataset.id, el);
            });

            let hasLayoutChange = false;
            const newElements = list.map((d) => {
              // Unique ID: Name + Shift Time so duplicate doctors don't overwrite each other
              const shiftJam = d.Jam && d.Jam !== "-" ? d.Jam : "no-time";
              const id = `${d.Dokter}_${shiftJam}`;
              const hash = `${d.Status}|${d.Jam}|${d._isActive}|${d["Code Antrian"] || ""}|${d.JamDaftar}`;

              // Helpers for styles
              const st = d.Status.toUpperCase();
              let c = "st-nopoli",
                i = "block",
                l = d.Status;
              if (st === "PRAKTEK" || st === "PENDAFTARAN") {
                c = "st-buka";
                i = "check_circle";
                l = "BUKA";
              } else if (st === "TERJADWAL") {
                c = "st-buka st-terjadwal";
                i = "schedule";
                l = "TERJADWAL";
              } else if (st.includes("PENUH")) {
                c = "st-penuh";
                i = "groups";
                l = "PENUH";
              } else if (st.includes("OPERASI")) {
                c = "st-operasi";
                i = "local_hospital";
                l = "OPERASI";
              } else if (st.includes("CUTI")) {
                c = "st-cuti";
                i = "flight";
                l = "CUTI";
              }
              const avatarText = buildAvatarHtml(d);
              if (d._isActive) c += " active";

              let labelJam = "REGISTRASI DIBUKA";
              let labelLive = "SEDANG MELAYANI";
              if (st.includes("OPERASI")) {
                labelJam = "TINDAKAN MEDIS";
                labelLive = "SEDANG OPERASI";
              } else if (st.includes("PENUH")) {
                labelJam = "STATUS KUOTA";
                labelLive = "TELAH PENUH";
              } else if (st.includes("CUTI")) {
                labelJam = "JADWAL CUTI";
                labelLive = "TIDAK MELAYANI";
              } else if (st === "TERJADWAL") {
                labelJam = "MENUNGGU SHIFT";
                labelLive = "BELUM MULAI";
              }


              let el = oldMap.get(id);

              if (el) {
                // RECYCLE: Only update if Hash changed
                if (el.dataset.hash !== hash) {
                  el.className = `platter ${c}`;

                  // IN-PLACE DOM Update (Menghindari innerHTML untuk performa)
                  const dName = el.querySelector(".doc-name");
                  if (dName) dName.textContent = d.Dokter;

                  const dSpec = el.querySelector(".doc-spec");
                  if (dSpec) dSpec.textContent = d.Spesialis.toUpperCase();

                  const stPill = el.querySelector(".status-pill");
                  if (stPill) {
                    stPill.style.background = `var(--status-bg)`;
                    stPill.style.color = `var(--status-color)`;
                    stPill.innerHTML = `<span class="material-icons-round" style="font-size:12px">${i}</span>${l}`;
                  }

                  const jValDaftar = el.querySelector(".jam-val-daftar");
                  if (jValDaftar)
                    jValDaftar.textContent =
                      d.JamDaftar !== "-"
                        ? d.JamDaftar
                        : formatJam(d.JamPraktek.split("-")[0]);

                  const jValPraktek = el.querySelector(".jam-val-praktek");
                  if (jValPraktek && d.JamPraktek)
                    jValPraktek.textContent = d.JamPraktek;

                  const dtTime = el.querySelector(".detail-time");
                  if (dtTime)
                    dtTime.textContent =
                      d.JamDaftar !== "-"
                        ? d.JamDaftar
                        : formatJam(d.JamPraktek.split("-")[0]);

                  const dtLabel = el.querySelector(".detail-label");
                  if (dtLabel) dtLabel.textContent = labelJam;

                  const lText = el.querySelector(".live-text");
                  if (lText) lText.textContent = labelLive;

                  el.dataset.hash = hash;
                }
                // Hapus class animasi lama
                el.classList.remove("platter-new");
                oldMap.delete(id); // Mark handled
              } else {
                // CREATE: New element dengan animasi slide-in
                el = document.createElement("div");
                el.className = `platter ${c} platter-new`;
                el.dataset.id = id;
                el.dataset.hash = hash;
                el.innerHTML = buildCardHTML(d, avatarText, i, l, labelJam, labelLive);

                hasLayoutChange = true;
                // Hapus class animasi setelah selesai
                el.addEventListener(
                  "animationend",
                  () => el.classList.remove("platter-new"),
                  { once: true },
                );
              }
              return el;
            });

            // If items removed, we need layout update
            if (oldMap.size > 0) hasLayoutChange = true;

            // Check if order changed
            if (!hasLayoutChange) {
              for (let i = 0; i < newElements.length; i++) {
                if (container.children[i] !== newElements[i]) {
                  hasLayoutChange = true;
                  break;
                }
              }
            }

            // Apply to DOM only if structural change occurred
            if (hasLayoutChange) {
              container.replaceChildren(...newElements);
              return true; // Signal scroller to reset
            }

            return false; // No scroll reset needed
          };

          const changed1 = updateList("scrollBedah", group.Bedah);
          const changed2 = updateList("scrollNonBedah", group.NonBedah);

          // --- SIDEBAR: Grouped Render (OPERASI + PENUH + CUTI terpisah) ---
          const changed3 = this._renderSidebar(
            group.SidebarOperasi,
            group.SidebarPenuh,
            group.SidebarCuti,
            updateList,
          );

          $("countBedah").textContent = group.Bedah.length;
          $("countNonBedah").textContent = group.NonBedah.length;
          $("countSidebar").textContent =
            group.SidebarPenuh.length + group.SidebarCuti.length;

          // Only reset scroller if list structure changed (avoid jumpiness on simple updates)
          if (!isMobile) {
            if (changed1) {
              s1.reset();
              requestAnimationFrame(() => s1.updateMetrics());
            }
            if (changed2) {
              s2.reset();
              requestAnimationFrame(() => s2.updateMetrics());
            }
            if (changed3) {
              s3.reset();
              requestAnimationFrame(() => s3.updateMetrics());
            }
          }
        },

        // Render sidebar dengan section header terpisah
        _renderSidebar(operasiList, penuhList, cutiList, updateList) {
          const container = $("scrollSidebar");
          const oldMap = new Map();
          Array.from(container.children).forEach((el) => {
            if (el.dataset.id) oldMap.set(el.dataset.id, el);
          });

          const allElements = [];
          let hasLayoutChange = false;

          // Helper: Buat section header
          const makeSectionHeader = (label, color, count, id) => {
            let el = container.querySelector(`[data-section="${id}"]`);
            if (!el) {
              el = document.createElement("div");
              el.className = "sidebar-section-header";
              el.dataset.section = id;
              hasLayoutChange = true;
            }
            el.innerHTML = `
                        <div class="sidebar-section-dot" style="background:${color}"></div>
                        <span class="sidebar-section-label">${label}</span>
                        <div class="sidebar-section-line"></div>
                        <span class="sidebar-section-count">${count}</span>
                    `;
            return el;
          };

          // Helper: Buat platter card (reuse dari updateList logic)
          const makeCard = (d) => {
            // Unique ID: Name + Shift Time
            const shiftJam = d.Jam && d.Jam !== "-" ? d.Jam : "no-time";
            const id = `${d.Dokter}_${shiftJam}`;
            const hash = `${d.Status}|${d.Jam}|${d._isActive}|${d["Code Antrian"] || ""}|${d.JamDaftar}`;
            const st = d.Status.toUpperCase();
            let c = "st-nopoli", i = "block", l = d.Status;
            if (st === "PRAKTEK") { c = "st-praktek"; i = "check_circle"; l = "PRAKTEK"; }
            else if (st === "PENDAFTARAN") { c = "st-pendaftaran"; i = "assignment"; l = "PENDAFTARAN"; }
            else if (st === "TERJADWAL") { c = "st-terjadwal"; i = "schedule"; l = "TERJADWAL"; }
            else if (st === "SELESAI") { c = "st-selesai"; i = "done_all"; l = "SELESAI"; }
            else if (st === "PENUH") { c = "st-penuh"; i = "groups"; l = "PENUH"; }
            else if (st === "OPERASI") { c = "st-operasi"; i = "local_hospital"; l = "OPERASI"; }
            else if (st === "CUTI") { c = "st-cuti"; i = "flight"; l = "CUTI"; }
            else if (st === "LIBUR") { c = "st-libur"; i = "block"; l = "LIBUR"; }
            const avatarText = buildAvatarHtml(d);
            if (d._isActive) c += " active";

            let labelJam = "REGISTRASI DIBUKA";
            let labelLive = "SEDANG MELAYANI";
            if (st.includes("OPERASI")) {
              labelJam = "TINDAKAN MEDIS";
              labelLive = "SEDANG OPERASI";
            } else if (st.includes("PENUH")) {
              labelJam = "STATUS KUOTA";
              labelLive = "TELAH PENUH";
            } else if (st.includes("CUTI")) {
              labelJam = "JADWAL CUTI";
              labelLive = "TIDAK MELAYANI";
            } else if (st === "TERJADWAL") {
              labelJam = "MENUNGGU SHIFT";
              labelLive = "BELUM MULAI";
            }

            let el = oldMap.get(id);

            if (el) {
              if (el.dataset.hash !== hash) {
                el.className = `platter ${c}`;

                // IN-PLACE DOM Update Sidebar
                const dName = el.querySelector(".doc-name");
                if (dName) dName.textContent = d.Dokter;

                const dSpec = el.querySelector(".doc-spec");
                if (dSpec) dSpec.textContent = d.Spesialis.toUpperCase();

                const stPill = el.querySelector(".status-pill");
                if (stPill) {
                  stPill.style.background = `var(--status-bg)`;
                  stPill.style.color = `var(--status-color)`;
                  stPill.innerHTML = `<span class="material-icons-round" style="font-size:12px">${i}</span>${l}`;
                }

                const jValDaftar = el.querySelector(".jam-val-daftar");
                if (jValDaftar)
                  jValDaftar.textContent =
                    d.JamDaftar !== "-"
                      ? d.JamDaftar
                      : formatJam(d.JamPraktek.split("-")[0]);

                const jValPraktek = el.querySelector(".jam-val-praktek");
                if (jValPraktek && d.JamPraktek)
                  jValPraktek.textContent = d.JamPraktek;

                const dtTime = el.querySelector(".detail-time");
                if (dtTime)
                  dtTime.textContent =
                    d.JamDaftar !== "-"
                      ? d.JamDaftar
                      : formatJam(d.JamPraktek.split("-")[0]);

                const dtLabel = el.querySelector(".detail-label");
                if (dtLabel) dtLabel.textContent = labelJam;

                const lText = el.querySelector(".live-text");
                if (lText) lText.textContent = labelLive;

                el.dataset.hash = hash;
              }
              el.classList.remove("platter-new");
              oldMap.delete(id);
            } else {
              el = document.createElement("div");
              el.className = `platter ${c} platter-new`;
              el.dataset.id = id;
              el.dataset.hash = hash;
              el.innerHTML = buildCardHTML(d, avatarText, i, l, labelJam, labelLive);
              hasLayoutChange = true;
              el.addEventListener(
                "animationend",
                () => el.classList.remove("platter-new"),
                { once: true },
              );
            }
            return el;
          };

          // --- Build grouped layout ---
          if (operasiList.length > 0) {
            allElements.push(
              makeSectionHeader(
                "Tindakan Operasi",
                "#BF5AF2",
                operasiList.length,
                "sec-operasi",
              ),
            );
            operasiList.forEach((d) => allElements.push(makeCard(d)));
          }

          if (penuhList.length > 0) {
            allElements.push(
              makeSectionHeader(
                "Kuota Penuh",
                "#FF9F0A",
                penuhList.length,
                "sec-penuh",
              ),
            );
            penuhList.forEach((d) => allElements.push(makeCard(d)));
          }

          if (cutiList.length > 0) {
            allElements.push(
              makeSectionHeader(
                "Sedang Cuti",
                "#FF453A",
                cutiList.length,
                "sec-cuti",
              ),
            );
            cutiList.forEach((d) => allElements.push(makeCard(d)));
          }

          // Deteksi perubahan
          if (oldMap.size > 0) hasLayoutChange = true;
          if (!hasLayoutChange) {
            const currentChildren = Array.from(container.children);
            if (currentChildren.length !== allElements.length) {
              hasLayoutChange = true;
            } else {
              for (let i = 0; i < allElements.length; i++) {
                if (currentChildren[i] !== allElements[i]) {
                  hasLayoutChange = true;
                  break;
                }
              }
            }
          }

          if (hasLayoutChange) {
            container.replaceChildren(...allElements);
            return true;
          }
          return false;
        },
      };

      App.init();
    </script>
  </body>
</html>
